# WebSocket upgrade map (required for go2rtc streaming)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # Serve the React application
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # SPA routing fallback
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to Flask backend
    location /api/ {
        proxy_pass http://cam-backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket (Socket.IO) support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Socket.IO endpoint
    location /socket.io/ {
        proxy_pass http://cam-backend:8001/socket.io/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Reverse proxy go2rtc streams (OPTIMIZED for video streaming)
    location /go2rtc/ {
        proxy_pass http://go2rtc-server:1984/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket + streaming critical headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Streaming performance: NO buffering, NO caching
        proxy_buffering off;
        proxy_cache off;

        # Keep connection alive for long streams (24h)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
