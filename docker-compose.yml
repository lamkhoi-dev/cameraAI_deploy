services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15-alpine
    container_name: cam_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_detection}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- go2rtc Streaming Server ---
  # Converts RTSP → WebRTC/HLS for browser playback
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: cam_go2rtc
    network_mode: host
    volumes:
      - ./media_server/go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped

  # --- FastAPI Backend ---
  # network_mode: host so backend can reach go2rtc at localhost:1984
  # and reach cameras on 192.168.1.x LAN directly
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cam_backend
    network_mode: host
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@127.0.0.1:5432/${DB_NAME:-ai_detection}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      GO2RTC_API: http://localhost:1984
      CAMERA_ONBOARD_LIMIT: ${CAMERA_ONBOARD_LIMIT:-10}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
