# Docker Compose for Camera Tracking AI System
# Production deployment on VPS with Tesla P4
#
# Services:
#   ai-engine   - AI inference (YOLO, FaceID, Color Analysis)
#   backend     - Flask API + SocketIO (port 8001)
#   go2rtc      - RTSP streaming server (port 1984, 8554)
#   postgres    - PostgreSQL database
#   frontend    - React Dashboard (port 3333)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # View logs
#   docker compose down           # Stop and remove

services:
  # ===== Backend API - Flask + SocketIO =====
  # Receives AI results, serves REST API, broadcasts via SocketIO
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cam-backend:v1.0
    container_name: cam-backend

    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@cam-postgres:5432/camera_db"
      API_KEY: "${API_KEY:-}"
      LOG_LEVEL: "INFO"

    networks:
      - camera-network

    ports:
      - "8001:8001"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===== AI Engine - Main inference service =====
  # Processes video frames from cameras via go2rtc
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: camera-ai:v1.0
    container_name: camera-tracking-ai

    # GPU support (Tesla P4)
    runtime: nvidia

    env_file: .env
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CUDA_VISIBLE_DEVICES: "0"
      VIDEO_SOURCE: "rtsp://go2rtc-server:8554/camera1"
      BACKEND_API_URL: "http://cam-backend:8001"
      API_KEY: "${API_KEY:-}"
      LOG_LEVEL: "INFO"

    volumes:
      - ./ai_engine/models:/app/ai_engine/models
      - ./cropped_data:/app/cropped_data
      - ./logs:/app/logs

    networks:
      - camera-network

    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
        reservations:
          memory: 6G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c", "from ultralytics import YOLO; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    depends_on:
      go2rtc:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ===== go2rtc - Camera streaming & RTSP server =====
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: go2rtc-server

    networks:
      - camera-network

    ports:
      - "8554:8554/tcp"
      - "8554:8554/udp"
      - "1984:1984/tcp"

    environment:
      - GO2RTC_RTSP_LISTEN=:8554
      - GO2RTC_HTTP_LISTEN=:1984
      - TZ=Asia/Ho_Chi_Minh

    volumes:
      - ./media_server/go2rtc.yaml:/config/go2rtc.yaml:ro

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1984/api"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:15-alpine
    container_name: cam-postgres

    networks:
      - camera-network

    ports:
      - "5432:5432"

    environment:
      - POSTGRES_DB=${POSTGRES_DB:-camera_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - TZ=Asia/Ho_Chi_Minh

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ===== Frontend - React Dashboard =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/api"
        VITE_GO2RTC_BASE: "/go2rtc"
    image: camcore-frontend:v1.0
    container_name: cam-frontend

    networks:
      - camera-network

    ports:
      - "3333:80"

    depends_on:
      - backend

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Networks
networks:
  camera-network:
    driver: bridge

# Volumes
volumes:
  postgres_data:
    driver: local
