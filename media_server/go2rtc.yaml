# go2rtc Configuration — 25 Building Cameras
# Using SUB-STREAM for stable multi-camera viewing
# Hikvision: Channels/102 = sub-stream (~480P/10FPS)
# Dahua: subtype=1 = sub-stream (~480P/10FPS)
# AI Engine will process max 15 at a time

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

